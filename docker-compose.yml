services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurora-django
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      USE_POSTGRES: "0"
      NOTIFICATION_SENDER: flask
      NOTIFICATIONS_SERVICE_URL: http://flask:5001/api/v2/funcionalidad
    command: sh -c "python manage.py migrate && gunicorn aurora_studio.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"

  flask:
    build:
      context: ./microservices/flask_funcionalidad
      dockerfile: Dockerfile
    container_name: aurora-flask
    env_file:
      - ./microservices/flask_funcionalidad/.env
    ports:
      - "5001:5001"

  nginx:
    image: nginx:1.27-alpine
    container_name: aurora-nginx
    depends_on:
      - django
      - flask
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
