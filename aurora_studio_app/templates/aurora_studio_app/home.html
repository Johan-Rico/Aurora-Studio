<!DOCTYPE html>
<html>
<head>
    <title>Aurora Studio</title>
</head>
<body>
    <h1>Aurora Studio</h1>
    <a href="{% url 'reserva' %}">Hacer Reserva</a>
    
    <h2>Servicios Disponibles</h2>
    {% if servicios %}
        <ul>
        {% for servicio in servicios %}
            <li>{{ servicio.nombre }} - ${{ servicio.precio }} ({{ servicio.duracion }}h)</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No hay servicios.</p>
    {% endif %}
</body>
</html>
